version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-api
    restart: always
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BlogDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=YourSuperSecretKeyThatIsAtLeast32Characters!@#$
      - Jwt__Issuer=BlogApi
      - Jwt__Audience=BlogApp
      - Jwt__ExpiryInMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - blog-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: blog-db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - blog-network

volumes:
  sqlserver_data:
    name: blog-sqlserver-data

networks:
  blog-network:
    name: blog-network
    driver: bridge